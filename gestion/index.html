<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Administración — PS Max Multisoluciones</title>

  <style>
    body {
      background: #f8fafc;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .nc-appHeader {
      background: #ffffff !important;
      box-shadow: 0 2px 12px rgba(0,0,0,.08) !important;
    }
    .nc-appHeader h1 {
      font-weight: 600;
    }
  </style>

  <!-- Netlify Identity (SOLO el script) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // ============================
    // Preview productos
    // ============================
    var ProductPreview = createClass({
      render: function () {
        var entry = this.props.entry;
        var title = entry.getIn(['data', 'title']) || '';
        var excerpt = entry.getIn(['data', 'excerpt']) || '';
        var image = entry.getIn(['data', 'image']) || '';
        var linea = entry.getIn(['data', 'linea']) || '';
        var categoria = entry.getIn(['data', 'categoria']) || '';
        var published = entry.getIn(['data', 'published']);
        var isPublished = (published === true || published === 'true');

        var COLORS = {
          border: 'rgba(16, 185, 129, 0.28)',
          shadow: 'rgba(2, 6, 23, 0.08)',
          title: '#166534',
          text: '#334155',
          muted: 'rgba(15, 23, 42, 0.60)',
          chipBg: 'rgba(22, 101, 52, 0.10)',
          chipText: '#166534',
          bg: '#ffffff'
        };

        return h('div', { style: { padding: '22px' } }, [
          h('div', {
            style: {
              background: COLORS.bg,
              border: '1px solid ' + COLORS.border,
              borderRadius: '18px',
              boxShadow: '0 10px 24px ' + COLORS.shadow,
              padding: '18px'
            }
          }, [
            h('h2', { style: { color: COLORS.title } }, title || 'Producto'),
            h('p', { style: { color: COLORS.text } }, excerpt || 'Sin descripción'),
            h('p', { style: { color: COLORS.muted } },
              isPublished ? 'Publicado' : 'No publicado'
            )
          ])
        ]);
      }
    });

    CMS.registerPreviewTemplate('productos', ProductPreview);
  </script>
</body>
</html>
