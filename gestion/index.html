<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Administración — PS Max Multisoluciones</title>

  <style>
    body { background:#f8fafc; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    .nc-appHeader { background:#fff !important; box-shadow:0 2px 12px rgba(0,0,0,.08) !important; }
    .nc-appHeader h1 { font-weight:600; }
    #boot-msg { padding: 16px; color:#334155; font-size:14px; }
    #boot-err { padding: 16px; color:#b91c1c; font-size:14px; white-space:pre-wrap; }
  </style>

  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>
  <div id="boot-msg">Cargando panel de administración…</div>
  <div id="boot-err" style="display:none;"></div>

  <script>
  (function () {
    function showError(msg) {
      var err = document.getElementById("boot-err");
      var ok = document.getElementById("boot-msg");
      if (ok) ok.style.display = "none";
      if (err) {
        err.style.display = "block";
        err.textContent = msg;
      }
      console.error(msg);
    }

    function getInviteToken() {
      // hash: #invite_token=XXX
      var h = window.location.hash || "";
      var m1 = h.match(/invite_token=([^&]+)/);

      // query: ?invite_token=XXX
      var q = new URLSearchParams(window.location.search);
      var m2 = q.get("invite_token");

      return (m1 && m1[1]) || m2 || "";
    }

    function injectScript(url) {
      return new Promise(function (resolve, reject) {
        var s = document.createElement("script");
        s.src = url;
        s.async = true;
        s.onload = resolve;
        s.onerror = function () { reject(new Error("No se pudo cargar: " + url)); };
        // ✅ HEAD siempre existe (evita el error intermitente)
        document.head.appendChild(s);
      });
    }

    async function loadDecapAndRegister() {
      // Evita doble carga
      if (window.__decapLoaded) return;
      window.__decapLoaded = true;

      try {
        await injectScript("https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js");
      } catch (e) {
        showError("Error cargando Decap CMS.\n\n" + (e && e.message ? e.message : e));
        return;
      }

      // Espera a que CMS exista
      if (!window.CMS || !window.createClass || !window.h) {
        showError("Decap cargó pero CMS no está disponible. Revisa bloqueos (adblock) o CSP.");
        return;
      }

      // ============================
      // TU PREVIEW "tipo tarjeta"
      // ============================
      var ProductPreview = createClass({
        render: function () {
          var entry = this.props.entry;
          var title = entry.getIn(['data', 'title']) || '';
          var excerpt = entry.getIn(['data', 'excerpt']) || '';
          var image = entry.getIn(['data', 'image']) || '';
          var linea = entry.getIn(['data', 'linea']) || '';
          var categoria = entry.getIn(['data', 'categoria']) || '';
          var ficha = entry.getIn(['data', 'ficha']) || '';
          var published = entry.getIn(['data', 'published']);
          var isPublished = (published === true || published === 'true');

          var COLORS = {
            border: 'rgba(16, 185, 129, 0.28)',
            shadow: 'rgba(2, 6, 23, 0.08)',
            title: '#166534',
            text: '#334155',
            muted: 'rgba(15, 23, 42, 0.60)',
            chipBg: 'rgba(22, 101, 52, 0.10)',
            chipText: '#166534',
            bg: '#ffffff'
          };

          var card = {
            background: COLORS.bg,
            border: '1px solid ' + COLORS.border,
            borderRadius: '18px',
            boxShadow: '0 10px 24px ' + COLORS.shadow,
            overflow: 'hidden',
            maxWidth: '420px'
          };

          var header = { padding: '18px 18px 8px 18px' };

          var titleStyle = {
            margin: 0,
            fontSize: '18px',
            fontWeight: 700,
            letterSpacing: '0.2px',
            color: COLORS.title
          };

          var metaRow = {
            marginTop: '10px',
            display: 'flex',
            gap: '8px',
            flexWrap: 'wrap'
          };

          var chip = {
            display: 'inline-flex',
            alignItems: 'center',
            gap: '6px',
            padding: '6px 10px',
            borderRadius: '999px',
            background: COLORS.chipBg,
            color: COLORS.chipText,
            fontSize: '12px',
            fontWeight: 600,
            lineHeight: 1
          };

          var chipOff = {
            display: 'inline-flex',
            alignItems: 'center',
            gap: '6px',
            padding: '6px 10px',
            borderRadius: '999px',
            background: 'rgba(239, 68, 68, 0.10)',
            color: '#b91c1c',
            fontSize: '12px',
            fontWeight: 700,
            lineHeight: 1
          };

          var imgWrap = { padding: '0 18px 12px 18px' };

          var imgBox = {
            width: '100%',
            height: '220px',
            borderRadius: '14px',
            border: '1px solid rgba(15, 23, 42, 0.10)',
            background: '#ffffff',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            overflow: 'hidden'
          };

          var imgStyle = {
            width: '100%',
            height: '100%',
            objectFit: 'contain',
            display: 'block',
            padding: '10px'
          };

          var body = { padding: '0 18px 18px 18px' };

          var excerptStyle = {
            margin: 0,
            color: COLORS.text,
            fontSize: '14px',
            lineHeight: 1.6
          };

          var linkRow = {
            marginTop: '12px',
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center'
          };

          var linkStyle = {
            display: 'inline-flex',
            gap: '6px',
            alignItems: 'center',
            textDecoration: 'none',
            color: '#1d4ed8',
            fontSize: '13px',
            fontWeight: 600
          };

          var noteStyle = {
            marginTop: '8px',
            fontSize: '12px',
            color: COLORS.muted
          };

          return h('div', { style: { padding: '22px', fontFamily: 'system-ui, -apple-system, Segoe UI, sans-serif' } }, [
            h('div', { style: card }, [
              h('div', { style: header }, [
                h('h2', { style: titleStyle }, title || 'Nombre del producto'),
                h('div', { style: metaRow }, [
                  linea ? h('span', { style: chip }, ['Línea: ', linea]) : null,
                  categoria ? h('span', { style: chip }, ['Categoría: ', categoria]) : null,
                  isPublished ? h('span', { style: chip }, 'Publicado') : h('span', { style: chipOff }, 'No publicado')
                ])
              ]),
              image ? h('div', { style: imgWrap }, [
                h('div', { style: imgBox }, [
                  h('img', { src: image, alt: title, style: imgStyle })
                ])
              ]) : h('div', { style: imgWrap }, [
                h('div', {
                  style: Object.assign({}, imgStyle, {
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    color: 'rgba(15,23,42,.55)',
                    fontSize: '13px',
                    fontWeight: 600
                  })
                }, 'Sin imagen (sube una en “Imagen”)')
              ]),
              h('div', { style: body }, [
                excerpt
                  ? h('p', { style: excerptStyle }, excerpt)
                  : h('p', { style: Object.assign({}, excerptStyle, { color: COLORS.muted }) }, 'Agrega una “Descripción corta” para que se vea aquí.'),
                h('div', { style: linkRow }, [
                  h('span', { style: linkStyle }, ['Ver producto ', '→']),
                  ficha ? h('span', { style: Object.assign({}, noteStyle, { marginTop: 0 }) }, 'Ficha técnica: ✅')
                        : h('span', { style: Object.assign({}, noteStyle, { marginTop: 0 }) }, 'Ficha técnica: —')
                ]),
                h('div', { style: noteStyle }, 'Vista previa estilo “tarjeta” (aproximada a la web).')
              ])
            ])
          ]);
        }
      });

      CMS.registerPreviewTemplate('productos', ProductPreview);

      // oculta mensaje de carga si quedó
      var ok = document.getElementById("boot-msg");
      if (ok) ok.style.display = "none";
    }

    function start() {
      try {
        var token = getInviteToken();
        if (token) sessionStorage.setItem("invite_token", token);

        if (!window.netlifyIdentity) {
          showError("Netlify Identity no está disponible. Revisa si el script fue bloqueado.");
          return;
        }

        // ✅ IMPORTANTE: registrar listeners ANTES del init()
        window.netlifyIdentity.on("init", function (user) {
          var stored = sessionStorage.getItem("invite_token");

          // Si hay invite y NO hay user => abrir signup
          if (stored && !user) {
            // Mantén hash “invite_token=...”
            window.location.hash = "invite_token=" + stored;

            setTimeout(function () {
              window.netlifyIdentity.open("signup");
            }, 150);

            return; // no cargues decap aún
          }

          // Si ya hay sesión => carga decap
          loadDecapAndRegister();
        });

        window.netlifyIdentity.on("login", function () {
          sessionStorage.removeItem("invite_token");
          window.netlifyIdentity.close();

          // ir a ruta normal del CMS
          window.location.hash = "#/";
          loadDecapAndRegister();
        });

        window.netlifyIdentity.on("error", function (err) {
          showError("Netlify Identity error: " + (err && err.message ? err.message : err));
        });

        // ✅ ahora sí inicializa
        window.netlifyIdentity.init();

        // ✅ fallback por si algún navegador no dispara init (raro)
        setTimeout(function () {
          if (!window.__decapLoaded) loadDecapAndRegister();
        }, 1200);

      } catch (e) {
        showError("Error inicializando /gestion.\n\n" + (e && e.message ? e.message : e));
      }
    }

    // ✅ arranca cuando el DOM esté listo
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", start);
    } else {
      start();
    }
  })();
  </script>
</body>
</html>
