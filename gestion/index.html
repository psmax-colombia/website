<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Administración — PS Max Multisoluciones</title>

  <style>
    body {
      background: #f8fafc;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .nc-appHeader {
      background: #ffffff !important;
      box-shadow: 0 2px 12px rgba(0,0,0,.08) !important;
    }
    .nc-appHeader h1 { font-weight: 600; }
  </style>
</head>
<body>
  
  <!-- Netlify Identity Widget -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>
  (function () {
    // 1) Capturar invite_token apenas llegue la página (ANTES de que Decap cambie el hash)
    var hash = window.location.hash || "";
    var match = hash.match(/invite_token=([^&]+)/);

    if (match && match[1]) {
      sessionStorage.setItem("invite_token", match[1]);
    }

    // 2) Inicializar Identity
    if (!window.netlifyIdentity) return;
    window.netlifyIdentity.init();

    // 3) Si hay token guardado, forzar flujo de signup
    window.netlifyIdentity.on("init", function (user) {
      var token = sessionStorage.getItem("invite_token");
      if (token && !user) {
        // reinyecta el hash para que Identity lo detecte
        window.location.hash = "invite_token=" + token;

        // abre el modal de signup
        setTimeout(function () {
          window.netlifyIdentity.open("signup");
        }, 200);
      }
    });

    // 4) Cuando haga login, limpiar token y volver a /gestion/
    window.netlifyIdentity.on("login", function () {
      sessionStorage.removeItem("invite_token");
      window.netlifyIdentity.close();
      window.location.href = "/gestion/";
    });
  })();
</script>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // ==========================================
    // Preview "tipo tarjeta"
    // ==========================================
    var ProductPreview = createClass({
      render: function () {
        var entry = this.props.entry;
        var title = entry.getIn(['data', 'title']) || '';
        var excerpt = entry.getIn(['data', 'excerpt']) || '';
        var image = entry.getIn(['data', 'image']) || '';
        var linea = entry.getIn(['data', 'linea']) || '';
        var categoria = entry.getIn(['data', 'categoria']) || '';
        var ficha = entry.getIn(['data', 'ficha']) || '';
        var published = entry.getIn(['data', 'published']);
        var isPublished = (published === true || published === 'true');

        // Colores / 
        var COLORS = {
          border: 'rgba(16, 185, 129, 0.28)',   // verde suave
          shadow: 'rgba(2, 6, 23, 0.08)',
          title: '#166534',                    // verde oscuro
          text: '#334155',                     // gris azulado
          muted: 'rgba(15, 23, 42, 0.60)',
          chipBg: 'rgba(22, 101, 52, 0.10)',
          chipText: '#166534',
          bg: '#ffffff'
        };

        var card = {
          background: COLORS.bg,
          border: '1px solid ' + COLORS.border,
          borderRadius: '18px',
          boxShadow: '0 10px 24px ' + COLORS.shadow,
          overflow: 'hidden',
          maxWidth: '420px'
        };

        var header = {
          padding: '18px 18px 8px 18px'
        };

        var titleStyle = {
          margin: 0,
          fontSize: '18px',
          fontWeight: 700,
          letterSpacing: '0.2px',
          color: COLORS.title
        };

        var metaRow = {
          marginTop: '10px',
          display: 'flex',
          gap: '8px',
          flexWrap: 'wrap'
        };

        var chip = {
          display: 'inline-flex',
          alignItems: 'center',
          gap: '6px',
          padding: '6px 10px',
          borderRadius: '999px',
          background: COLORS.chipBg,
          color: COLORS.chipText,
          fontSize: '12px',
          fontWeight: 600,
          lineHeight: 1
        };

        var chipOff = {
          display: 'inline-flex',
          alignItems: 'center',
          gap: '6px',
          padding: '6px 10px',
          borderRadius: '999px',
          background: 'rgba(239, 68, 68, 0.10)',
          color: '#b91c1c',
          fontSize: '12px',
          fontWeight: 700,
          lineHeight: 1
        };

        var imgWrap = {
          padding: '0 18px 12px 18px'
        };

       var imgBox = {
          width: '100%',
          height: '220px',
          borderRadius: '14px',
          border: '1px solid rgba(15, 23, 42, 0.10)',
          background: '#ffffff',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          overflow: 'hidden'
        };
        
        var imgStyle = {
          width: '100%',
          height: '100%',
          objectFit: 'contain',   // ✅ importante
          display: 'block',
          padding: '10px'
        };


        var body = {
          padding: '0 18px 18px 18px'
        };

        var excerptStyle = {
          margin: 0,
          color: COLORS.text,
          fontSize: '14px',
          lineHeight: 1.6
        };

        var linkRow = {
          marginTop: '12px',
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center'
        };

        var linkStyle = {
          display: 'inline-flex',
          gap: '6px',
          alignItems: 'center',
          textDecoration: 'none',
          color: '#1d4ed8',
          fontSize: '13px',
          fontWeight: 600
        };

        var noteStyle = {
          marginTop: '8px',
          fontSize: '12px',
          color: COLORS.muted
        };

        // Render
        return h('div', { style: { padding: '22px', fontFamily: 'system-ui, -apple-system, Segoe UI, sans-serif' } }, [
          h('div', { style: card }, [
            h('div', { style: header }, [
              h('h2', { style: titleStyle }, title || 'Nombre del producto'),
              h('div', { style: metaRow }, [
                linea ? h('span', { style: chip }, ['Línea: ', linea]) : null,
                categoria ? h('span', { style: chip }, ['Categoría: ', categoria]) : null,
                isPublished ? h('span', { style: chip }, 'Publicado') : h('span', { style: chipOff }, 'No publicado')
              ])
            ]),

            image ? h('div', { style: imgWrap }, [
                h('div', { style: imgBox }, [
                  h('img', { src: image, alt: title, style: imgStyle })
                ])
              ]) : h('div', { style: imgWrap }, [
              h('div', {
                style: {
                  ...imgStyle,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  color: 'rgba(15,23,42,.55)',
                  fontSize: '13px',
                  fontWeight: 600
                }
              }, 'Sin imagen (sube una en “Imagen”)')
            ]),

            h('div', { style: body }, [
              excerpt
                ? h('p', { style: excerptStyle }, excerpt)
                : h('p', { style: { ...excerptStyle, color: COLORS.muted } }, 'Agrega una “Descripción corta” para que se vea aquí.'),

              h('div', { style: linkRow }, [
                h('span', { style: linkStyle }, ['Ver producto ', '→']),
                ficha ? h('span', { style: { ...noteStyle, marginTop: 0 } }, 'Ficha técnica: ✅') : h('span', { style: { ...noteStyle, marginTop: 0 } }, 'Ficha técnica: —')
              ]),

              h('div', { style: noteStyle },
                'Vista previa estilo “tarjeta” (aproximada a la web).'
              )
            ])
          ])
        ]);
      }
    });

    CMS.registerPreviewTemplate('productos', ProductPreview);
  </script>

</body>
</html>
