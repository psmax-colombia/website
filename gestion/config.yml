backend:
  name: github
  repo: psmax-colombia/website
  branch: main
  base_url: https://psmax-auth-server.onrender.com
  auth_endpoint: auth

local_backend: true

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

locale: "es"

collections:
  # =========================
  # AJUSTES DEL SITIO
  # =========================
  - name: "site"
    label: "Ajustes del sitio"
    files:
      - name: "global"
        label: "Configuración general"
        file: "content/site.json"
        fields:
          # Branding
          - { label: "Nombre del sitio", name: "siteName", widget: "string" }
          - { label: "Logo", name: "logo", widget: "image" }

          # =========================
          # CONTACTO
          # =========================
          - label: "Correo"
            name: "email"
            widget: "string"
            hint: "Ej: contacto@psmaxmultisoluciones.com"

          - label: "Teléfono (formato internacional)"
            name: "phone"
            widget: "string"
            required: false
            hint: "Ej: +573001234567"
            pattern:
              [
                "^\\+?[1-9]\\d{7,14}$",
                "Usa formato internacional. Ej: +573001234567",
              ]

          - label: "Dirección"
            name: "address"
            widget: "string"
            required: false
            hint: "Ej: Bogotá, Colombia"

          - label: "WhatsApp (formato internacional)"
            name: "whatsapp"
            widget: "string"
            hint: "Ej: 573001234567 (solo números) o +573001234567"
            pattern:
              [
                "^\\+?[1-9]\\d{7,14}$",
                "Usa formato internacional. Ej: 573001234567",
              ]

          - label: "Mensaje WhatsApp"
            name: "whatsappMessage"
            widget: "text"
            required: false
            hint: "Mensaje que se abrirá automáticamente al dar clic en Contáctanos"

          # =========================
          # REDES SOCIALES
          # =========================
          - label: "Facebook (URL)"
            name: "socialFacebook"
            widget: "string"
            required: false
            hint: "Ej: https://facebook.com/psmax..."
            pattern:
              [
                "^(https?:\\/\\/).+",
                "Debe ser una URL válida (iniciar con http:// o https://)",
              ]

          - label: "Instagram (URL)"
            name: "socialInstagram"
            widget: "string"
            required: false
            hint: "Ej: https://instagram.com/psmax..."
            pattern:
              [
                "^(https?:\\/\\/).+",
                "Debe ser una URL válida (iniciar con http:// o https://)",
              ]

          - label: "LinkedIn (URL)"
            name: "socialLinkedin"
            widget: "string"
            required: false
            hint: "Ej: https://linkedin.com/company/psmax..."
            pattern:
              [
                "^(https?:\\/\\/).+",
                "Debe ser una URL válida (iniciar con http:// o https://)",
              ]

          # =========================
          # SLIDES HERO
          # =========================
          - label: "Slides del Hero"
            name: "heroSlides"
            widget: "list"
            collapsed: true
            summary: "{{fields.title}}"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - {
                  label: "Subtítulo",
                  name: "subtitle",
                  widget: "text",
                  required: false,
                }
              - { label: "Imagen", name: "image", widget: "image" }
              - {
                  label: "CTA Label",
                  name: "ctaLabel",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "CTA Href",
                  name: "ctaHref",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "Orden",
                  name: "order",
                  widget: "number",
                  default: 1,
                  required: false,
                }
          # =========================
          # EXPERIENCIA (Home)
          # =========================
          - label: "Experiencia - Imagen"
            name: "imgExperiencia"
            widget: "image"
            required: false

          - label: "Experiencia - Texto"
            name: "experienceText"
            widget: "text"
            required: false

          - label: "Experiencia - Alto imagen (px)"
            name: "imgExperienciaHeight"
            widget: "number"
            required: false
            value_type: "int"
            min: 0

          - label: "Experiencia - Separación inferior (px)"
            name: "imgExperienciaGap"
            widget: "number"
            required: false
            value_type: "int"
            min: 0

          - label: "Experiencia - Alineación"
            name: "imgExperienciaAlign"
            widget: "select"
            required: false
            options: ["left", "center", "right"]

          # =========================
          # HOME: NUESTROS SERVICIOS
          # =========================
          - label: "Título sección Servicios (Home)"
            name: "serviceSectionTitle"
            widget: "string"
            required: false
            default: "Nuestros Productos"

          - label: "Líneas de Servicios (Home)"
            name: "productLines"
            widget: "list"
            collapsed: true
            summary: "{{fields.title}}"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }

              - label: "Imagen"
                name: "image"
                widget: "image"
                required: false
                hint: "Imagen de la tarjeta (Home)"

              - label: "Link"
                name: "link"
                widget: "string"
                required: false
                hint: "Ej: productos.html"

              - label: "Anchor"
                name: "anchor"
                widget: "string"
                required: false
                hint: "Ej: aseo-de-superficies"

              - {
                  label: "Orden",
                  name: "order",
                  widget: "number",
                  default: 1,
                  required: false,
                }

          # =========================
          # COLORES
          # =========================
          - label: "Color fondo sección Contáctanos"
            name: "contactBgColor"
            widget: "color"
            required: false
            hint: "Ej: #0f172a"

          # =========================
          # FOOTER
          # =========================
          - label: "Footer - Texto copyright"
            name: "footerCopyright"
            widget: "string"
            required: false
            hint: "Puedes usar {year} para el año automático. Ej: © PS Max Multisoluciones {year}. Todos los derechos reservados."

  # =========================
  # NOSOTROS (SECCIÓN APARTE)
  # =========================
  - name: "nosotros"
    label: "Nosotros"
    files:
      - name: "page"
        label: "Página Nosotros"
        file: "content/nosotros.json"
        fields:
          - {
              label: "Título",
              name: "aboutTitle",
              widget: "string",
              required: false,
              default: "Sobre Nosotros",
            }
          - {
              label: "Imagen",
              name: "aboutImage",
              widget: "image",
              required: false,
            }
          - {
              label: "Párrafo 1",
              name: "aboutText1",
              widget: "text",
              required: false,
            }
          - {
              label: "Párrafo 2",
              name: "aboutText2",
              widget: "text",
              required: false,
            }

          - {
              label: "Misión (título)",
              name: "missionTitle",
              widget: "string",
              required: false,
              default: "Misión",
            }
          - {
              label: "Misión (texto)",
              name: "missionText",
              widget: "text",
              required: false,
            }

          - {
              label: "Visión (título)",
              name: "visionTitle",
              widget: "string",
              required: false,
              default: "Visión",
            }
          - {
              label: "Visión (texto)",
              name: "visionText",
              widget: "text",
              required: false,
            }

          - {
              label: "Valores (título)",
              name: "valuesTitle",
              widget: "string",
              required: false,
              default: "Valores",
            }
          - label: "Valores (lista)"
            name: "valuesItems"
            widget: "list"
            required: false
            fields:
              - { label: "Valor", name: "item", widget: "string" }

  # =========================
  # PRODUCTOS
  # =========================
  - name: "productos"
    label: "Productos"
    folder: "content/productos"
    format: "json"
    extension: "json"
    create: true

    slug: "{{linea | slug}}-{{categoria | slug}}-{{title | slug}}"

    summary: "{{title}} — {{linea}} / {{categoria}}"
    sortable_fields: ["order", "title", "linea", "categoria", "published"]

    fields:
      - {
          label: "Publicado",
          name: "published",
          widget: "boolean",
          default: true,
        }
      - {
          label: "Orden",
          name: "order",
          widget: "number",
          default: 1,
          required: false,
        }
      - { label: "Título", name: "title", widget: "string" }

      - label: "Línea"
        name: "linea"
        widget: "select"
        options:
          - "Lavandería Institucional y Hospitalaria"
          - "Aseo y Superficies"
          - "Aseo de Cocinas"
          - "Cuidado Personal"

      - label: "Categoría"
        name: "categoria"
        widget: "select"
        options:
          - "Detergentes"
          - "Suavizantes"
          - "Blanqueadores"
          - "Desmanchadores"
          - "Refuerzos / Desengrasantes"
          - "Pisos"
          - "Superficies"
          - "Baños"
          - "Ambientadores"
          - "Vajilla y superficies"
          - "Vajilla y Superficies"
          - "Desengrasantes de cocina"
          - "Jabón de manos"
          - "Alcohol"
          - "Alcohol glicerinado"
          - "Gel antibacterial"

      - {
          label: "Descripción corta",
          name: "excerpt",
          widget: "text",
          required: false,
        }
      - {
          label: "Descripción larga",
          name: "description",
          widget: "text",
          required: false,
        }

      - label: "Presentaciones"
        name: "presentaciones"
        widget: "list"
        required: false
        summary: "{{fields.empaque}} - {{fields.volumen}}{{fields.unidad}}"
        fields:
          - label: "Empaque"
            name: "empaque"
            widget: "select"
            options:
              - "Galón"
              - "Garrafa"
              - "Botella"
              - "Bidón"
              - "Bolsa"
              - "Unidad"
            required: true

          - label: "Cantidad"
            name: "volumen"
            widget: "number"
            value_type: "int"
            min: 1
            required: true

          - label: "Unidad de medida"
            name: "unidad"
            widget: "select"
            options:
              - "ml"
              - "L"
              - "kg"
              - "g"
              - "unid"
            required: true

      - label: "Imagen"
        name: "image"
        widget: "image"
        required: false
        hint: "PNG/JPG de buena calidad"

      - label: "Ficha técnica (PDF)"
        name: "ficha"
        widget: "file"
        required: false
        hint: "Sube un PDF si aplica"

  # =========================
  # ÍNDICE DE PRODUCTOS (PUBLICADOS)
  # =========================
  - name: "productos_index"
    label: "Productos publicados"
    files:
      - name: "index"
        label: "Listado de productos visibles"
        file: "content/products_index.json"
        fields:
          - label: "Productos"
            name: "items"
            widget: "list"
            summary: "Producto: {{fields.product}}"
            hint: "Selecciona los productos que aparecerán en la web"
            fields:
              - label: "Producto"
                name: "product"
                widget: "relation"
                collection: "productos"
                search_fields: ["title", "linea", "categoria"]
                value_field: "{{slug}}"
                display_fields: ["title", "linea", "categoria"]
